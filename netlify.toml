[build]
  command = "npm run build"
  publish = "dist"

# React Router handles routing client-side, so every path needs to resolve
# to index.html on the server — otherwise refreshing or directly visiting
# a route like /portfolio or /admin/dashboard 404s, since no such file
# exists in the build output.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
